# 테마를 Light로 고정하지 않음. 사용자가 설정에서 "Use system setting" / "Light" / "Dark" 중 선택 가능.
# 라이트/다크 각각 커스텀 색상만 정의하고, base는 지정하지 않아 시스템 설정을 따르도록 함.
[theme.light]
primaryColor = "#FF6B6B"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F0F2F6"
textColor = "#262730"
font = "sans serif"

[theme.dark]
primaryColor = "#FF6B6B"
backgroundColor = "#0E1117"
secondaryBackgroundColor = "#262730"
textColor = "#FAFAFA"
font = "sans serif"

[server]
headless = true
port = 8501
enableXsrfProtection = true

[browser]
gatherUsageStats = false
